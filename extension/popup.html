<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Баллы</title>
  <style>
    body { width: 260px; padding: 10px; font-family: sans-serif; margin: 0; }
    h3 { margin: 5px 0 10px 0; font-size: 16px; }
    button { padding: 5px 8px; margin: 3px 0; box-sizing: border-box; background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 11px; border-radius: 3px; white-space: nowrap; }
    button:hover { opacity: 0.9; }
    button:disabled { background: #666; cursor: not-allowed; opacity: 0.7; }
    .points { font-size: 20px; font-weight: bold; text-align: center; margin: 8px 0; }
    .status { font-size: 11px; color: #666; text-align: center; margin-bottom: 10px; }
    a { display: block; text-align: center; margin-top: 8px; font-size: 11px; }
    .shop-section { margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; }
    .shop-section h4 { margin: 0 0 8px 0; font-size: 13px; }
    .shop-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11px; }
    .shop-item .icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .shop-item .info { flex: 1; min-width: 0; }
    .shop-item .name { font-weight: bold; font-size: 11px; }
    .shop-item .desc { font-size: 9px; color: #666; }
    .shop-item .controls { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
    .shop-item .buy-btn { padding: 3px 6px; font-size: 10px; min-width: 65px; text-align: center; }
    .time-input { width: 40px; padding: 2px; font-size: 10px; border: 1px solid #ccc; border-radius: 2px; }
    .set-time { padding: 2px 5px; font-size: 9px; background: #2196F3; }
  </style>
</head>
<body>
  <h3>Game Points</h3>
  <div class="points" id="pointsDisplay">0</div>
  <div class="status" id="statusText">Баллов доступно</div>
  
  <div class="shop-section">
    <h4>🛒 Магазин</h4>
    <div id="shopItems"></div>
  </div>
  
  <a href="#" id="openOptions">Настройки сайтов</a>
  
  <script src="popup.js"></script>
</body>
</html>
